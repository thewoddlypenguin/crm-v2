services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CRM_PUBLIC_API_KEY=${CRM_PUBLIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=leveragecrm
      - POSTGRES_USER=leverage
      - POSTGRES_PASSWORD=K1VdzxyfFW1gU9*Hzv9ZCX#eViysj
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leverage -d leveragecrm"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
